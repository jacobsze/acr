{% extends "base.html" %}
{% block title %}Verify Code – Cat Rescue Scheduler{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-envelope-check acr-hero-icon"></i>
          <h4 class="mt-2 mb-0">Check your email</h4>
          <p class="text-muted small">We sent a 6-digit code to <strong>{{ email }}</strong>.</p>
        </div>
        <form method="post" action="{{ url_for('auth.verify') }}">
          <input type="hidden" name="email" value="{{ email }}">
          <div class="mb-3">
            <label class="form-label" for="otp">Login code</label>
            <input type="text" id="otp" name="otp" class="form-control form-control-lg text-center otp-input"
                   placeholder="000000" maxlength="6" inputmode="numeric"
                   pattern="[0-9]{6}" autocomplete="one-time-code" autofocus required>
          </div>
          <button type="submit" class="btn acr-btn-primary w-100 mb-2">
            <i class="bi bi-check-lg"></i> Verify
          </button>
        </form>
        <form method="post" action="{{ url_for('auth.resend_otp') }}">
          <input type="hidden" name="email" value="{{ email }}">
          <button type="submit" class="btn btn-outline-secondary w-100 btn-sm">
            <i class="bi bi-arrow-clockwise"></i> Resend code
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('auth.login') }}" class="small text-muted">Use a different email</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
