{% extends "base.html" %}
{% block title %}Log In – Cat Rescue Scheduler{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-calendar2-heart acr-hero-icon"></i>
          <h4 class="mt-2 mb-0">Cat Rescue Scheduler</h4>
          <p class="text-muted small">Enter your email to receive a login code.</p>
        </div>
        <form method="post" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label class="form-label" for="email">Email address</label>
            <input type="email" id="email" name="email" class="form-control"
                   placeholder="you@example.com" autofocus required>
          </div>
          <button type="submit" class="btn acr-btn-primary w-100">
            <i class="bi bi-send"></i> Send my code
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
