{% extends "base.html" %}
{% block title %}Edit {{ volunteer.name }} – Cat Rescue Scheduler{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-pencil"></i> Edit Volunteer</h5>
      </div>
      <div class="card-body">
        <form method="post" action="{{ url_for('admin.edit_volunteer', user_id=volunteer.id) }}">
          <div class="mb-3">
            <label class="form-label">Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control"
                   value="{{ volunteer.name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email <span class="text-danger">*</span></label>
            <input type="email" name="email" class="form-control"
                   value="{{ volunteer.email }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-control"
                   value="{{ volunteer.phone or '' }}">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn acr-btn-primary">Save changes</button>
            <a href="{{ url_for('admin.volunteers') }}" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
