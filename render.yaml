services:
  - type: web
    name: cat-rescue-scheduler
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OWNER_EMAIL
        sync: false
      - key: APP_URL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_FRONTEND_API_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: cat-rescue-db
          property: connectionString

databases:
  - name: cat-rescue-db
    databaseName: acr
    plan: free
